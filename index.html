<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aqoon-sameeye Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginSection" class="active">
        <div class="login-card">
            <h1>SKILL—BASE</h1>
            <p>Geli ID-gaaga si aad u bilowdo</p>
            <input type="text" id="studentID" placeholder="ID (Tusaale: SB-111)">
            <button onclick="validateAccess()">LOGIN</button>
        </div>
    </div>

    <div id="courseSection">
        <header>
            <span id="courseTitle">Course Name</span>
            <button onclick="location.reload()" style="width: auto; padding: 5px 15px;">Logout</button>
        </header>
        <div class="video-container">
            <video id="videoPlayer" controls playsinline>
                <source id="videoSrc" src="" type="video/mp4">
            </video>
        </div>
        <div id="playlistItems" class="lesson-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
