<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aqoon-sameeye Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginSection" class="active">
        <div class="login-card">
            <div class="logo">FAHAM-ACADEMY</div>
            <p>Geli aqoonsigaaga si aad u gasho casharka</p>
            <div class="input-group">
                <input type="text" id="studentID" placeholder="ID-GA ARDAYGA (SB-111)">
            </div>
            <button class="btn-primary" onclick="validateAccess()">BILOW CASHARKA</button>
        </div>
    </div>

    <div id="courseSection">
        <header class="top-bar">
            <h2 id="courseTitle">Loading...</h2>
            <button class="logout-btn" onclick="location.reload()">Ka bax</button>
        </header>

        <main class="content-layout">
            <div class="video-section">
                <div class="video-wrapper">
                    <video id="videoPlayer" controls controlsList="nodownload" playsinline>
                        <source id="videoSrc" src="" type="video/mp4">
                    </video>
                </div>
            </div>

            <aside class="playlist-section">
                <h3>LIISKA CASHARRADA</h3>
                <div id="playlistItems" class="lesson-list"></div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
